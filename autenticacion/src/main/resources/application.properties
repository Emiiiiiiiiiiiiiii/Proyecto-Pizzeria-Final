server.port=8080

spring.application.name=ms-autenticacion

spring.datasource.url=jdbc:mysql://localhost:3306/autenticacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

url.notificaciones=http://localhost:8086/notificaciones/

# Configuración Swagger/OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

#abre con http://localhost:8080/swagger-ui.html