server:
  port: 8080

spring:
  application:
    name: ms-autenticacion

  datasource:
    url: jdbc:mysql://localhost:3306/autenticacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

url:
  notificaciones: http://localhost:8086/notificaciones/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha