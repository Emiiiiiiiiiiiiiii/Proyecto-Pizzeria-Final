server:
  port: 8087

spring:
  application:
    name: ms-reparto

  datasource:
    url: jdbc:mysql://localhost:3306/reparto?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

url:
  pedidos: http://localhost:8083/pedidos/
  auth: http://localhost:8080/auth/usuarios/
  notificaciones: http://localhost:8086/notificaciones/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha