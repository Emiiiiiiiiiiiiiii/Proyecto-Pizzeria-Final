server.port=8088
spring.application.name=ms-resenas

# Configuración de la Base de Datos en Laragon
spring.datasource.url=jdbc:mysql://localhost:3306/resenas?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#URLs DE CONEXIÓN A OTROS MICROSERVICIOS
url.auth=http://localhost:8080/auth/
url.pedidos=http://localhost:8083/pedidos/
url.catalogo=http://localhost:8081/catalogo/
