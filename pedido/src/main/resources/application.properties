server.port=8083

spring.application.name=ms-pedido

spring.datasource.url=jdbc:mysql://localhost:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

url.auth=http://localhost:8080/auth/
url.carrito=http://localhost:8082/carrito/
url.inventario=http://localhost:8084/inventario/
url.pagos=http://localhost:8085/pagos/
url.notificaciones=http://localhost:8086/notificaciones/

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

#ver en http://localhost:8083/swagger-ui/index.html