# 1. PUERTO DEL MICROSERVICIO
server.port=8083

# 2. NOMBRE DE LA APLICACIÓN
spring.application.name=ms-pedidos

# 3. CONEXIÓN A LARAGON 
spring.datasource.url=jdbc:mysql://localhost:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# 4. ESTRATEGIA DE HIBERNATE
spring.jpa.hibernate.ddl-auto=update

# 5. MOSTRAR SQL
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# 6. URLs DE CONEXIÓN A OTROS MICROSERVICIOS
url.auth=http://localhost:8080/auth/
url.carrito=http://localhost:8082/carrito/
url.inventario=http://localhost:8084/inventario/
url.pagos=http://localhost:8085/pagos/
url.notificaciones=http://localhost:8086/notificaciones/