server:
  port: 8083

spring:
  application:
    name: ms-pedido

  datasource:
    url: jdbc:mysql://localhost:3306/pedidos?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

url:
  auth: http://localhost:8080/auth/
  carrito: http://localhost:8082/carrito/
  inventario: http://localhost:8084/inventario/
  pagos: http://localhost:8085/pagos/
  notificaciones: http://localhost:8086/notificaciones/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true