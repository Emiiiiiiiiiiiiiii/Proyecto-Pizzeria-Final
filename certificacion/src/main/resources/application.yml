server:
  port: 8089

spring:
  application:
    name: ms-certificacion

  datasource:
    url: jdbc:mysql://localhost:3306/certificacion?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

url:
  pedidos: http://localhost:8083/pedidos/
  reparto: http://localhost:8087/reparto/
  resenas: http://localhost:8088/resenas/

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true